{% extends 'base/base.html' %}
{% block content %}
<div class="container d-flex justify-content-center">
    <div class="dashboard-card border border-dark rounded-0 p-4 p-md-5 my-5 w-100 animate-fade-up" style="max-width: 450px;">
        <h2 class="fw-bold mb-4" style="letter-spacing: -1px;">LOGIN</h2>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="small fw-bold text-uppercase">Username</label>
                <input type="text" name="username" class="form-control rounded-0 border-dark shadow-none py-2" required>
            </div>
            <div class="mb-4">
                <label class="small fw-bold text-uppercase">Password</label>
                <input type="password" name="password" class="form-control rounded-0 border-dark shadow-none py-2" required>
            </div>
            <button type="submit" class="btn btn-dark btn-pro w-100 rounded-0 py-3 fw-bold mb-3">MASUK</button>
        </form>
        
        <p class="small text-center text-muted">Belum punya akun? <a href="{% url 'register' %}" class="text-dark fw-bold">Daftar sekarang</a></p>
    </div>
</div>
{% endblock %}
