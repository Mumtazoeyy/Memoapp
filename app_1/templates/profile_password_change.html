{% extends 'base/base.html' %}
{% load static %}

{% block title %}Change Password{% endblock %}

{% block content %}
<style>
    @keyframes fadeUp {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
    }

    .fade-up-item {
        opacity: 0;
        animation: fadeUp 0.6s ease-out forwards;
    }

    .delay-0 { animation-delay: 0.0s; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }

    .profile-card {
        border: 1px solid #000;
        padding: 2.5rem;
        background: #fff;
    }

    .form-label {
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
        display: block;
    }

    .password-container {
        position: relative;
        width: 100%;
    }

    .profile-card input {
        border: 1px solid #000 !important;
        border-radius: 0 !important;
        padding: 12px 45px 12px 12px;
        width: 100%;
        font-size: 0.95rem;
        transition: all 0.2s ease;
    }

    .profile-card input:focus {
        outline: none;
        border-color: #000;
        background-color: #fffaf0;
    }

    .toggle-password {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
        opacity: 0.6;
        color: #000;
    }
    .toggle-password:hover { opacity: 1; }

    .btn-action {
        border-radius: 0 !important;
        font-weight: 700;
        text-transform: uppercase;
        padding: 10px 25px;
        border: 1px solid #000;
        width: 100%;
    }
</style>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="profile-card fade-up-item delay-0">
                
                <h4 class="fw-black text-uppercase border-bottom border-dark pb-3 mb-4 fade-up-item delay-1">Change Password</h4>
                
                <form method="post">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-4 fade-up-item delay-2">
                            <label class="form-label">{{ field.label }}</label>
                            <div class="password-container">
                                {{ field }}
                                <button type="button" class="toggle-password" onclick="togglePassword(this)">
                                    <!-- Ikon Mata Terbuka -->
                                    <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                            </div>
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors.as_text }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    
                    <div class="d-flex align-items-center gap-2 mt-4 fade-up-item delay-3">
                        <button type="submit" class="btn btn-dark btn-action">Update Password</button>
                    </div>
                </form>
                
                <div class="mt-4 pt-3 border-top border-dark text-center fade-up-item delay-4">
                    <a href="{% url 'profile' %}" class="text-dark fw-bold text-decoration-none" style="font-size: 0.8rem;">BACK TO PROFILE</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function togglePassword(button) {
        const input = button.previousElementSibling;
        const icon = button.querySelector('svg');
        
        // Ikon Mata Terbuka (Eye)
        const eyeSvg = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`;
        
        // Ikon Mata Tertutup/Garis Miring (Eye Off)
        const eyeOffSvg = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>`;

        if (input.type === "password") {
            input.type = "text";
            icon.innerHTML = eyeOffSvg; // Ganti jadi mata dicoret
        } else {
            input.type = "password";
            icon.innerHTML = eyeSvg; // Ganti jadi mata terbuka
        }
    }
</script>
{% endblock %}
