{% for item in reading_items %}
<tr>
    <!-- No. (40px) -->
    <td class="text-start" style="width: 40px;">{{ forloop.counter }}</td>
    
    <!-- Title -->
    <td class="text-start fw-bold text-dark">{{ item.title }}</td>
    
    <!-- Chapters (px-2) -->
    <td class="text-start px-2 text-nowrap">Ch. {{ item.chapters }}</td>
    
    <!-- Season (px-2) -->
    <td class="text-start px-2 text-nowrap">{{ item.season|default:"-" }}</td>
    
    <!-- Status (px-2) -->
    <td class="text-start px-2 text-nowrap">{{ item.status_relation.name|default:"-" }}</td>
    
    <!-- Rating (px-2) -->
    <td class="text-start fw-bold px-2 text-nowrap">{{ item.hype }}</td>
    
    <!-- Category (px-2) -->
    <td class="text-start px-2 text-nowrap">{{ item.category.name|default:"-" }}</td>
    
    <!-- Notes (px-2, min-width 150px) -->
    <td class="text-start px-2" style="min-width: 150px;">{{ item.notes|default:"-" }}</td>
    
    <!-- Actions (100px) -->
    <td class="text-end" style="width: 100px;">
        <a href="{% url 'reading_edit' item.id %}" class="btn btn-dark btn-sm rounded-0">Edit</a>
    </td>
    
    <!-- Checkbox (40px) -->
    <td class="text-center" style="width: 40px;">
        <input type="checkbox" class="item-checkbox" value="{{ item.id }}">
    </td>
</tr>
{% empty %}
    <tr><td colspan="10" class="text-center py-5">No results found.</td></tr>
{% endfor %}
